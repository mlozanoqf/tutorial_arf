project:
  type: book
  output-dir: _book

book:
  title: "Credit Risk with R"
  subtitle: "Tutorial"
  author: "Dr. Martin Lozano"
  page-navigation: true
  search: true
  date: today
  date-format: "MMMM D, YYYY"
  sidebar:
    style: docked
    collapse-level: 1
  page-footer:
    left: "Credit Risk with R"
    right: 'Dr. Martin Lozano &middot; <a href="mailto:mlozanoqf@gmail.com">mlozanoqf@gmail.com</a> &middot; <a href="https://mlozanoqf.github.io/">mlozanoqf.github.io</a>'
  chapters:
    - index.qmd
    - part: "Credit Scoring and Data"
      chapters:
        - 01-logistic.qmd
    - part: "Structural and Portfolio Models"
      chapters:
        - 02-merton.qmd
        - 03-gaussian-copula.qmd
        - 04-cvar.qmd
    - part: "References and Support"
      chapters:
        - references.qmd

bibliography: references.bib
link-citations: true

crossref:
  chapters: true

execute:
  warning: false
  message: false

format:
  html:
    theme:
      light: flatly
      dark: darkly
    toc: false
    toc-title: "On this page"
    toc-location: right
    toc-depth: 2
    smooth-scroll: true
    code-fold: true
    code-copy: true
    code-tools: false
    code-block-bg: true
    code-block-border-left: "#31BAE9"
    code-line-numbers: true
    number-sections: false
    page-layout: full
    include-after-body:
      - analytics_arf.html
      - back-to-top.html
      - progressbar.html
      - local-navigation.html
      - page-sections.html
      - sidebar-accordion.html
    css: styles.css
